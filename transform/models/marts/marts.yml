version: 2

models:
  - name: fct_events
    description: >
      Gold fact table, grain = one row per GitHub event. Incremental: each run
      appends rows ingested since the last build (filtered on ingested_at so
      backfilled old hours still arrive), with unique_key=event_id making
      re-processing idempotent. Bots are NOT filtered here — bot-ness lives in
      dim_actor, and consumers decide; the fact table records what happened.
    columns:
      - name: event_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: actor_id
        description: FK to dim_actor.
        tests:
          - not_null
          - relationships:
              to: ref('dim_actor')
              field: actor_id
      - name: repo_id
        description: FK to dim_repo.
        tests:
          - not_null
          - relationships:
              to: ref('dim_repo')
              field: repo_id
      - name: event_date
        description: FK to dim_date.
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: event_type
        description: Degenerate dimension; one of the 7 ingested types.
        tests:
          - not_null
      - name: payload_action
        description: Degenerate dimension (opened/closed/started/...).
      - name: create_ref_type
        description: Degenerate dimension for CreateEvent.
      - name: created_at
        description: Event timestamp (UTC).
        tests:
          - not_null
      - name: event_hour_ts
        description: Event timestamp truncated to hour.
      - name: pr_merged
        description: PR merged flag (PullRequestEvent).
      - name: pr_additions
        description: Lines added (PullRequestEvent).
        tests:
          - non_negative
      - name: pr_deletions
        description: Lines deleted (PullRequestEvent).
        tests:
          - non_negative
      - name: pr_changed_files
        description: Files changed (PullRequestEvent).
        tests:
          - non_negative
      - name: push_distinct_size
        description: Distinct commits in a push (PushEvent).
        tests:
          - non_negative
      - name: ingested_at
        description: Pipeline load timestamp; drives incremental processing.
        tests:
          - not_null

  - name: dim_repo
    description: >
      Repository dimension: one row per repo seen in the window, latest
      observed identity plus language/stars enrichment from PR payloads
      (null language = repo had no PR events; a documented limitation of
      event-derived data).
    columns:
      - name: repo_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: repo_name
        description: Latest observed "owner/name".
        tests:
          - not_null
      - name: org_login
        description: Owning org login, null for user-owned repos.
      - name: language
        description: Latest known primary language (null if never observed).
      - name: stars
        description: Latest known stargazer count.
        tests:
          - non_negative
      - name: first_seen_at
        description: First event timestamp for this repo in the window.
      - name: last_seen_at
        description: Latest event timestamp for this repo in the window.
      - name: n_events
        description: Total events for this repo in the window.
        tests:
          - non_negative

  - name: dim_actor
    description: >
      Actor dimension: one row per user/bot seen in the window, with heuristic
      is_bot flag (see bot_detection macro). Momentum metrics exclude bots via
      this flag; raw facts keep them.
    columns:
      - name: actor_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: actor_login
        description: Latest observed login.
        tests:
          - not_null
      - name: is_bot
        description: Heuristic bot flag (suffix patterns + known-bots list).
        tests:
          - not_null
      - name: first_seen_at
        description: First event timestamp for this actor in the window.
      - name: last_seen_at
        description: Latest event timestamp for this actor in the window.
      - name: n_events
        description: Total events by this actor in the window.
        tests:
          - non_negative
      - name: n_repos
        description: Distinct repos this actor touched in the window.
        tests:
          - non_negative

  - name: dim_date
    description: >
      Continuous day spine spanning the event window — no gaps, so period-over-
      period joins are safe even for days with zero events.
    columns:
      - name: date_day
        description: Primary key (date).
        tests:
          - unique
          - not_null
      - name: year
        description: Calendar year.
      - name: month
        description: Calendar month (1–12).
      - name: day_of_month
        description: Day of month (1–31).
      - name: iso_day_of_week
        description: ISO weekday (1=Monday … 7=Sunday).
      - name: day_name
        description: Weekday name.
      - name: week_start_date
        description: Monday of the ISO week; grain for weekly momentum metrics.
        tests:
          - not_null
      - name: is_weekend
        description: True for Saturday/Sunday (hobbyist-vs-work-hours analyses).
